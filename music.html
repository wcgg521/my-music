<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>共享音乐空间</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* 动态渐变背景 - 超酷炫动效 */
        body {
            min-height: 100vh;
            background: linear-gradient(-45deg, #ff6b6b, #4ecdc4, #45b7d1, #96ceb4);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 主容器 玻璃拟态效果 */
        .music-player {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 40px 30px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: center;
            color: white;
            z-index: 10;
        }

        /* 标题 */
        h1 {
            font-size: 28px;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        /* 歌曲名 */
        #song-name {
            font-size: 20px;
            margin: 15px 0;
            min-height: 30px;
        }

        /* 悬浮歌词 */
        #lyrics {
            height: 60px;
            margin: 20px 0;
            font-size: 16px;
            line-height: 30px;
            color: rgba(255,255,255,0.9);
            text-shadow: 0 0 8px rgba(255,255,255,0.4);
            overflow: hidden;
        }

        /* 按钮 */
        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 30px 0;
        }

        button {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: none;
            background: rgba(255,255,255,0.2);
            color: white;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 15px rgba(255,255,255,0.2);
        }

        button:hover {
            background: rgba(255,255,255,0.4);
            transform: scale(1.1);
        }
    </style>
</head>
<body>
    <div class="music-player">
        <h1>🎵 共享音乐空间</h1>
        <div id="song-name">正在加载...</div>
        <div id="lyrics">欢迎来到我的音乐世界 ✨</div>

        <div class="controls">
            <button id="prev">⏮️</button>
            <button id="play">▶️</button>
            <button id="next">⏭️</button>
        </div>
    </div>

    <audio id="audio"></audio>

    <script>
        // ====================== 你的歌曲列表 ======================
        const musicList = [
            {
                name: "TYO_Hot",
                url: "https://github.com/wcgg521/my-music/raw/refs/heads/main/Tokyo_Hot-Z3BROTHER.mp3",
                lyrics: "同 | 意 | 哦 "
            },
            {
                name: "纯音乐",
                url: "https://lz.qaiu.top/parser?url=https://share.weiyun.com/M0exLHOm",
                lyrics: "静心聆听 | 属于你的治愈时刻"
            }
        ];
        // ==========================================================

        let currentIndex = 0;
        const audio = document.getElementById('audio');
        const playBtn = document.getElementById('play');
        const songName = document.getElementById('song-name');
        const lyrics = document.getElementById('lyrics');

        // 加载歌曲
        function loadSong(index) {
            const song = musicList[index];
            audio.src = song.url;
            songName.innerText = song.name;
            lyrics.innerText = song.lyrics;
            audio.load();
        }

        // 播放/暂停
        function togglePlay() {
            if (audio.paused) {
                audio.play();
                playBtn.innerText = "⏸️";
            } else {
                audio.pause();
                playBtn.innerText = "▶️";
            }
        }

        // 上一首
        function prevSong() {
            currentIndex = (currentIndex - 1 + musicList.length) % musicList.length;
            loadSong(currentIndex);
            audio.play();
            playBtn.innerText = "⏸️";
        }

        // 下一首
        function nextSong() {
            currentIndex = (currentIndex + 1) % musicList.length;
            loadSong(currentIndex);
            audio.play();
            playBtn.innerText = "⏸️";
        }

        // 自动播放下一首
        audio.addEventListener('ended', nextSong);

        // 绑定按钮
        playBtn.addEventListener('click', togglePlay);
        document.getElementById('prev').addEventListener('click', prevSong);
        document.getElementById('next').addEventListener('click', nextSong);

        // 初始加载 + 🔥 自动播放
        loadSong(currentIndex);
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                audio.play().then(() => {
                    playBtn.innerText = "⏸️";
                }).catch(err => {});
            }, 500);
        });
    </script>
</body>
</html>
