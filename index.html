<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>共享音乐空间</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* ✅ 这里就是背景图片（可自己换） */
        body {
            min-height: 100vh;
            background-image: url("ge: url("https://github.com/wcgg521/my-music/blob/main/4GZS.png?raw=true");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .music-player {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 40px 30px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: center;
            color: white;
            z-index: 10;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        #song-name {
            font-size: 20px;
            margin: 15px 0;
            min-height: 30px;
        }

        #lyrics {
            height: 60px;
            margin: 20px 0;
            font-size: 16px;
            line-height: 30px;
            color: rgba(255,255,255,0.9);
            text-shadow: 0 0 8px rgba(255,255,255,0.4);
            overflow: hidden;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 30px 0;
        }

        button {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: none;
            background: rgba(255,255,255,0.2);
            color: white;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 15px rgba(255,255,255,0.2);
        }

        button:hover {
            background: rgba(255,255,255,0.4);
            transform: scale(1.1);
        }
    </style>
</head>
<body>
    <div class="music-player">
        <h1>🎵 共享音乐空间</h1>
        <div id="song-name">正在加载...</div>
        <div id="lyrics">欢迎来到我的音乐世界 ✨</div>

        <div class="controls">
            <button id="prev">⏮️</button>
            <button id="play">▶️</button>
            <button id="next">⏭️</button>
        </div>
    </div>

    <audio id="audio"></audio>

    <script>
        const musicList = [
            {
                name: "Tokyo Hot",
                url: "https://github.com/wcgg521/my-music/raw/refs/heads/main/Tokyo_Hot-Z3BROTHER.mp3",
                lyrics: "同 | 意 | 哦 ~"
            }
        ];

        let currentIndex = 0;
        const audio = document.getElementById('audio');
        const playBtn = document.getElementById('play');
        const songName = document.getElementById('song-name');
        const lyrics = document.getElementById('lyrics');

        function loadSong(index) {
            const song = musicList[index];
            audio.src = song.url;
            songName.innerText = song.name;
            lyrics.innerText = song.lyrics;
            audio.load();
        }

        function togglePlay() {
            if (audio.paused) {
                audio.play();
                playBtn.innerText = "⏸️";
            } else {
                audio.pause();
                playBtn.innerText = "▶️";
            }
        }

        function prevSong() {
            currentIndex = (currentIndex - 1 + musicList.length) % musicList.length;
            loadSong(currentIndex);
            audio.play();
            playBtn.innerText = "⏸️";
        }

        function nextSong() {
            currentIndex = (currentIndex + 1) % musicList.length;
            loadSong(currentIndex);
            audio.play();
            playBtn.innerText = "⏸️";
        }

        audio.addEventListener('ended', nextSong);
        playBtn.addEventListener('click', togglePlay);
        document.getElementById('prev').addEventListener('click', prevSong);
        document.getElementById('next').addEventListener('click', nextSong);

        window.addEventListener('DOMContentLoaded', () => {
            loadSong(currentIndex);
            setTimeout(() => {
                audio.play().then(() => {
                    playBtn.innerText = "⏸️";
                }).catch(err => {});
            }, 500);
        });
    </script>
</body>
</html>
